# Render Deployment Configuration

version: 1.0

services:
  - type: web
    name: my-nodejs-app
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: path
        path: "/"
        serviceId: my-nodejs-app
